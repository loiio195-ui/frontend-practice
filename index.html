<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мой первый сайт</title>

<style>
body {
    background: rgb(207, 206, 248);
    display: flex;
    align-items: center;
    flex-direction: column;
    gap: 20px;
    min-height: 100vh;
}

.myself {
    background: rgb(255, 255, 255);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    text-align: center;
    position: relative;
}

.status {
    width: 15px;
    height: 15px;
    background: rgba(52, 215, 52, 0.62);
    border-radius: 50%;
    position: absolute;
    top: 20px;
    right: 20px;
}

.banner {
    position: relative;
}

.banner-img {
    width: 450px;
    height: 250px;
    border-radius: 20px;
    object-fit: cover;
}

.banner-title {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: white;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 80%;
    padding: 2px 40px;
    background: rgba(130, 85, 192, 0.6);
    color: white;
    border-radius: 60px;
    margin-top: -300px;
}z      

.menu {
    margin: 0 15px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    flex-direction: row-reverse;
    gap: 30px;
}

.menu p {
    cursor: pointer;
    transition: 0.3s;
}

.menu p:hover {
    color: rgb(228, 226, 226);
    transform: translateY(-1px);
}

.contact-form {
    background: rgb(255, 255, 255);
    padding: 30px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 300px;
}

@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 20px;
    }

    .menu {
        flex-direction: column;
        gap: 10px;
    }
}
    

</style>

</head>

<nav class="navbar">
    <h2 class="logo">Варвара</h2>

    <div class="menu">
        <p>About</p>
        <p>Skills</p>
        <p>Contact</p>
    </div>

</nav>

<body>
    <div class="myself">
        <div class="status"></div>
        <h1>Меня зовут Варвара</h1>
        <p>Begginer Fronted Developer</p>
    </div>

    <div class="banner">
        <img class="banner-img" src="me.jpeg" alt="Мое фото">
        <h1 class="banner-title">Варвара</h1>
    </div>

<form class="contact-form">
    <input type="text" placeholder="Ваше имя">
    <input type="email" placeholder="Ваш email">
    <textarea placeholder="Ваше сообщение"></textarea>
    <button type="submit">Отправить</button>
</form>

</body>

</html>
